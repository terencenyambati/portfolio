<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            background: #0f172a;
            color: white;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            height: 100vh;

            background: #111827;

            padding: 25px;

            position: fixed;
            left: 0;
            top: 0;
        }

        .sidebar h2 {
            margin-bottom: 40px;
            color: #3b82f6;
        }

        .sidebar a {
            display: block;

            color: #cbd5e1;
            text-decoration: none;

            margin: 18px 0;

            transition: 0.3s;
        }

        .sidebar a:hover {
            color: white;
            transform: translateX(5px);
        }

        .sidebar button {
            margin-top: 40px;

            width: 100%;
            padding: 12px;

            border: none;
            border-radius: 8px;

            background: #ef4444;
            color: white;

            cursor: pointer;

            transition: 0.3s;
        }

        .sidebar button:hover {
            background: #dc2626;
        }

        /* MAIN AREA */
        .main {
            margin-left: 240px;

            width: 100%;

            padding: 30px;
        }

        .main h1 {
            margin-bottom: 25px;
        }

        /* CARDS */
        .cards {
            display: flex;
            gap: 20px;

            margin-top: 20px;
        }

        .card {
            flex: 1;

            background: #1e293b;

            padding: 25px;

            border-radius: 14px;

            box-shadow: 0 10px 20px rgba(0,0,0,0.2);

            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            margin-bottom: 12px;
            color: #93c5fd;
        }

        .card p {
            font-size: 22px;
            font-weight: bold;
        }

        /* ACTIVITY SECTION */
        .activity {
            margin-top: 35px;

            background: #1e293b;

            padding: 25px;

            border-radius: 14px;
        }

        .activity h2 {
            margin-bottom: 15px;
        }

        .activity ul {
            list-style: none;
        }

        .activity li {
            margin: 12px 0;
            color: #cbd5e1;
        }

    </style>

</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h2>Admin Panel</h2>

        <a href="#">Dashboard</a>
        <a href="#">Users</a>
        <a href="#">Analytics</a>
        <a href="#">Security</a>
        <a href="#">Settings</a>

        <button onclick="logout()">Logout</button>

    </div>

    <!-- MAIN CONTENT -->
    <div class="main">

        <h1>Dashboard Overview</h1>

        <!-- CARDS -->
        <div class="cards">

            <div class="card">
                <h3>Total Users</h3>
                <p>1,240</p>
            </div>

            <div class="card">
                <h3>Logins Today</h3>
                <p>87</p>
            </div>

            <div class="card">
                <h3>Security Status</h3>
                <p>Secure</p>
            </div>

        </div>

        <!-- ACTIVITY -->
        <div class="activity">

            <h2>Recent Activity</h2>

            <ul>
                <li>User admin@gmail.com logged in</li>
                <li>Password updated successfully</li>
                <li>Security scan completed</li>
                <li>System running normally</li>
            </ul>

        </div>

    </div>

    <!-- JAVASCRIPT -->
    <script>

        function logout() {
            localStorage.removeItem("loggedIn");
            window.location.href = "index.html";
        }

        // protect dashboard
        if (localStorage.getItem("loggedIn") !== "true") {
            window.location.href = "index.html";
        }

    </script>

</body>

</html>
